<!DOCTYPE html>
<html>
<head>
    <title>AI Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">Responsive AI Health System</span>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow-lg p-4 text-center">

        <h2 class="mb-3">Prediction Result</h2>

        <div class="alert alert-success">
            <h4>{{ prediction }}</h4>
            <p>Confidence: {{ confidence }}%</p>
        </div>

        <div class="alert alert-info">
            <strong>Precaution:</strong>
            <p>{{ advice }}</p>
        </div>

        <canvas id="chart" height="100"></canvas>

        <a href="/" class="btn btn-secondary mt-4">Check Again</a>

    </div>
</div>

<footer class="bg-dark text-white text-center p-3 mt-5">
    © 2026 AI Health Predictor | Built by You 🚀
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const ctx = document.getElementById('chart');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Confidence'],
            datasets: [{
                label: 'Prediction Accuracy',
                data: [{{ confidence }}],
                borderWidth: 1
            }]
        },
        options: {
            scales: {
                y: { beginAtZero: true, max: 100 }
            }
        }
    });
</script>

</body>
</html>
